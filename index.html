<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도현위키</title>
<style>
  :root {
    --hg: #3a7d44;
    --hgd: #2d6235;
    --bg: #f6f6f6;
    --abg: #ffffff;
    --bd: #aaaaaa;
    --bdl: #dddddd;
    --tx: #202020;
    --txl: #606060;
    --lk: #0645ad;
    --lkr: #cc0000;
    --tocbg: #f8f9fa;
    --qbg: #eef6ee;
    --hl: #eaecf0;
    --sh: rgba(0,0,0,0.1);
  }
  .dark {
    --bg: #1e1e1e;
    --abg: #252525;
    --bd: #555;
    --bdl: #3a3a3a;
    --tx: #e8e8e8;
    --txl: #aaaaaa;
    --lk: #7ab0ff;
    --lkr: #ff7777;
    --tocbg: #2a2a2a;
    --qbg: #1a2a1a;
    --hl: #2e2e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', Dotum, '돋움', sans-serif;
    background: var(--bg);
    color: var(--tx);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }
  a { color: var(--lk); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  /* ── Header ─────────────────────────── */
  #header {
    background: var(--hg);
    border-bottom: 2px solid var(--hgd);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 4px var(--sh);
  }
  #header-inner {
    display: flex; align-items: center;
    padding: 7px 16px; gap: 10px;
    max-width: 1200px; margin: 0 auto;
  }
  #logo {
    font-size: 19px; font-weight: bold; color: #fff;
    letter-spacing: -0.5px; white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  #logo em { color: #b8ffcc; font-style: normal; }
  #search-wrap { flex: 1; display: flex; gap: 4px; max-width: 460px; }
  #search-input {
    flex: 1; border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.92); color: #1a1a1a;
    padding: 5px 9px; font-size: 13px; border-radius: 2px; font-family: inherit;
  }
  #search-input:focus { outline: none; background: #fff; }
  .s-btn {
    background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.3);
    color: #fff; padding: 5px 9px; border-radius: 2px;
    cursor: pointer; font-size: 12px; font-family: inherit;
  }
  .s-btn:hover { background: rgba(0,0,0,0.38); }
  #header-tools { display: flex; gap: 4px; margin-left: auto; }
  .h-btn {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
    color: #fff; padding: 4px 9px; border-radius: 2px;
    cursor: pointer; font-size: 11px; font-family: inherit; white-space: nowrap;
  }
  .h-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── Layout ─────────────────────────── */
  #layout { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 48px); }

  /* ── Sidebar ─────────────────────────── */
  #sidebar {
    width: 175px; min-width: 175px;
    background: var(--abg); border-right: 1px solid var(--bdl); padding: 10px 0;
  }
  .side-sec { margin-bottom: 6px; }
  .side-hd { background: var(--hg); color: #fff; padding: 4px 10px; font-size: 11px; font-weight: bold; }
  .side-it {
    display: flex; align-items: center;
    padding: 4px 10px 4px 14px; cursor: pointer;
    font-size: 12px; color: var(--txl);
    border-bottom: 1px solid var(--bdl); gap: 5px;
  }
  .side-it:hover { background: var(--hl); color: var(--lk); }
  .side-it.on { background: var(--hl); color: var(--hg); font-weight: bold; }
  .side-cnt {
    margin-left: auto; background: var(--hl); color: var(--txl);
    padding: 1px 5px; border-radius: 8px; font-size: 10px;
  }
  #tag-cloud { padding: 6px 8px; display: flex; flex-wrap: wrap; gap: 3px; }

  /* ── Main ─────────────────────────── */
  #main { flex: 1; min-width: 0; }

  /* ── List View ─────────────────────── */
  #list-view { background: var(--abg); }
  #board-hdr {
    border-bottom: 2px solid var(--hg);
    padding: 8px 14px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }
  #board-ttl { font-size: 15px; font-weight: bold; color: var(--hg); }
  #board-ctrl { display: flex; gap: 5px; align-items: center; }
  .ctrl-sel {
    border: 1px solid var(--bdl); background: var(--abg); color: var(--tx);
    padding: 3px 5px; border-radius: 2px; font-size: 11px; font-family: inherit;
  }
  .write-btn {
    background: var(--hg); border: 1px solid var(--hgd); color: #fff;
    padding: 4px 12px; border-radius: 2px; cursor: pointer;
    font-size: 12px; font-weight: bold; font-family: inherit;
  }
  .write-btn:hover { background: var(--hgd); }

  #post-list { width: 100%; border-collapse: collapse; }
  #post-list thead tr { background: var(--hl); border-bottom: 1px solid var(--bdl); }
  #post-list th {
    padding: 5px 10px; text-align: left; font-size: 11px; color: var(--txl);
    font-weight: bold; border-right: 1px solid var(--bdl); white-space: nowrap;
  }
  #post-list th:last-child { border-right: none; }
  #post-list tbody tr { border-bottom: 1px solid var(--bdl); cursor: pointer; }
  #post-list tbody tr:hover { background: var(--hl); }
  #post-list td { padding: 7px 10px; font-size: 12px; vertical-align: middle; }
  .p-num { color: var(--txl); text-align: center; width: 40px; }
  .p-cat {
    display: inline-block; padding: 1px 5px; border-radius: 2px;
    font-size: 10px; font-weight: bold; white-space: nowrap;
  }
  .cat-마케팅 { background: #fef3cd; color: #856404; border: 1px solid #ffc107; }
  .cat-창작론 { background: #d1e7dd; color: #0f5132; border: 1px solid #198754; }
  .cat-생활팁 { background: #cfe2ff; color: #084298; border: 1px solid #0d6efd; }
  .p-title-cell { max-width: 380px; }
  .p-title-lk { color: var(--tx); font-weight: bold; font-size: 13px; }
  .p-title-lk:hover { color: var(--lk); }
  .p-tags { margin-top: 2px; display: flex; gap: 3px; flex-wrap: wrap; }
  .tag {
    display: inline-block; padding: 1px 5px; background: var(--hl);
    color: var(--txl); border: 1px solid var(--bdl); border-radius: 2px;
    font-size: 10px; cursor: pointer;
  }
  .tag:hover { background: var(--hg); color: #fff; border-color: var(--hg); }
  .p-date { color: var(--txl); font-size: 11px; white-space: nowrap; }
  .p-views { color: var(--txl); font-size: 11px; text-align: center; }
  .p-star { color: var(--txl); cursor: pointer; font-size: 14px; text-align: center; }
  .p-star.on { color: #e6ac00; }

  #pagination { padding: 10px; display: flex; justify-content: center; gap: 3px; }
  .pg-btn {
    border: 1px solid var(--bdl); background: var(--abg); color: var(--txl);
    padding: 4px 8px; border-radius: 2px; cursor: pointer;
    font-size: 12px; font-family: inherit;
  }
  .pg-btn:hover { background: var(--hl); }
  .pg-btn.on { background: var(--hg); color: #fff; font-weight: bold; border-color: var(--hg); }

  #stats-bar {
    background: var(--hl); border-top: 1px solid var(--bdl);
    padding: 3px 14px; font-size: 11px; color: var(--txl);
    display: flex; gap: 12px; flex-wrap: wrap;
  }
  .no-res { padding: 40px; text-align: center; color: var(--txl); font-size: 14px; }

  /* ── Post View (wiki article) ─────── */
  #post-view { display: none; background: var(--abg); }

  .wiki-art-header {
    padding: 14px 20px 10px;
    border-bottom: 2px solid var(--hg);
  }
  .wiki-art-cat { font-size: 11px; color: var(--txl); margin-bottom: 2px; }
  .wiki-art-title { font-size: 22px; font-weight: bold; color: var(--tx); line-height: 1.3; }
  .wiki-art-meta { display: flex; gap: 14px; margin-top: 6px; font-size: 11px; color: var(--txl); flex-wrap: wrap; }

  .wiki-action-bar {
    background: var(--hl); border-bottom: 1px solid var(--bdl);
    padding: 5px 14px; display: flex; gap: 4px; align-items: center;
  }
  .w-act-btn {
    border: 1px solid var(--bdl); background: var(--abg); color: var(--txl);
    padding: 3px 9px; border-radius: 2px; cursor: pointer;
    font-size: 12px; font-family: inherit;
  }
  .w-act-btn:hover { background: var(--hl); color: var(--hg); border-color: var(--hg); }
  .w-act-btn.danger { color: #cc0000; }
  .w-act-btn.danger:hover { background: #cc0000; color: #fff; border-color: #cc0000; }

  .wiki-tags-bar {
    padding: 6px 14px; border-bottom: 1px solid var(--bdl);
    display: flex; gap: 5px; align-items: center; flex-wrap: wrap;
  }
  .wiki-tags-lbl { font-size: 11px; color: var(--txl); font-weight: bold; }

  .wiki-content-area { padding: 16px 20px; min-height: 300px; }

  /* TOC */
  .wiki-toc {
    background: var(--tocbg); border: 1px solid var(--bdl); border-radius: 3px;
    display: table; padding: 10px 16px; margin: 0 0 18px 0;
    min-width: 180px; max-width: 380px;
  }
  .wiki-toc-hd {
    font-weight: bold; font-size: 13px; text-align: center;
    margin-bottom: 6px; padding-bottom: 5px;
    border-bottom: 1px solid var(--bdl); color: var(--tx);
  }
  .wiki-toc ol { list-style: none; padding: 0; margin: 0; }
  .wiki-toc li { font-size: 12px; margin: 3px 0; line-height: 1.4; }
  .wiki-toc li.toc-sub { padding-left: 14px; }
  .wiki-toc a { color: var(--lk); }
  .wiki-toc a:hover { text-decoration: underline; }

  /* Article markdown */
  .md-content { font-size: 14px; line-height: 1.8; color: var(--tx); }
  .md-content h1 {
    font-size: 20px; border-bottom: 2px solid var(--hg);
    padding-bottom: 4px; margin: 20px 0 10px;
    display: flex; align-items: center;
  }
  .md-content h2 {
    font-size: 17px; border-bottom: 1px solid var(--bdl);
    padding-bottom: 3px; margin: 18px 0 8px;
    display: flex; align-items: center;
  }
  .md-content h3 {
    font-size: 15px; margin: 14px 0 6px;
    display: flex; align-items: center;
  }
  .md-content h4 { font-size: 13px; margin: 10px 0 5px; }
  .sec-text { flex: 1; }
  .sec-num { color: var(--txl); font-weight: normal; font-size: 0.88em; margin-right: 4px; }
  .sec-edit {
    font-size: 11px; color: var(--txl); background: none;
    border: 1px solid var(--bdl); padding: 1px 5px; border-radius: 2px;
    cursor: pointer; font-family: inherit; font-weight: normal;
    margin-left: 8px; flex-shrink: 0;
  }
  .sec-edit:hover { background: var(--hl); color: var(--hg); border-color: var(--hg); }

  .md-content p { margin: 7px 0; }
  .md-content ul, .md-content ol { margin: 7px 0 7px 22px; }
  .md-content li { margin: 2px 0; }

  /* Blockquote — namu-wiki green-left style */
  .md-content blockquote {
    border-left: 4px solid var(--hg); padding: 8px 12px;
    background: var(--qbg); margin: 10px 0; color: var(--tx);
    border-radius: 0 3px 3px 0; font-size: 13px;
  }
  .md-content blockquote p { margin: 0; }

  /* Wiki quote box (bordered box) */
  .wiki-quote-box {
    border: 1px solid var(--bdl); background: var(--tocbg);
    padding: 10px 14px; margin: 12px 0; border-radius: 3px;
    font-size: 13px; color: var(--tx);
  }

  .md-content code {
    background: var(--hl); padding: 1px 5px; border-radius: 2px;
    font-family: 'Consolas','Courier New',monospace; font-size: 12px;
    border: 1px solid var(--bdl); color: #c7254e;
  }
  .dark .md-content code { color: #ff7fb3; }
  .md-content pre {
    background: #1e1e1e; color: #d4d4d4; padding: 12px 14px;
    border-radius: 3px; overflow-x: auto; margin: 10px 0;
    font-size: 12px; line-height: 1.5;
  }
  .md-content pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
  .md-content strong { font-weight: bold; }
  .md-content em { font-style: italic; color: var(--txl); }
  .md-content hr { border: none; border-top: 1px solid var(--bdl); margin: 14px 0; }
  .md-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  .md-content th { background: var(--hl); border: 1px solid var(--bdl); padding: 5px 10px; text-align: left; font-weight: bold; }
  .md-content td { border: 1px solid var(--bdl); padding: 4px 10px; }
  .md-content tr:nth-child(even) td { background: var(--tocbg); }

  /* Wiki links */
  .wl { color: var(--lk); cursor: pointer; }
  .wl:hover { text-decoration: underline; }
  .wl-new { color: var(--lkr); cursor: pointer; border-bottom: 1px dotted var(--lkr); }
  .wl-new:hover { text-decoration: none; opacity: 0.8; }

  /* Footnotes */
  sup.fn-ref {
    font-size: 10px; vertical-align: super;
    color: var(--lk); cursor: pointer; line-height: 0;
  }
  sup.fn-ref:hover { text-decoration: underline; }
  .fn-section { border-top: 1px solid var(--bdl); margin-top: 20px; padding-top: 10px; }
  .fn-section-hd { font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--tx); }
  .fn-item { font-size: 12px; color: var(--txl); margin: 3px 0; display: flex; gap: 6px; }
  .fn-num { font-weight: bold; color: var(--lk); min-width: 22px; }

  /* ── Editor ─────────────────────────── */
  #editor-view { display: none; background: var(--abg); }
  #ed-hdr { background: var(--hg); padding: 9px 16px; font-size: 14px; font-weight: bold; color: #fff; }
  #ed-form { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .f-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .f-lbl { font-size: 12px; font-weight: bold; color: var(--txl); min-width: 50px; }
  .f-inp {
    flex: 1; border: 1px solid var(--bdl); background: #fff; color: var(--tx);
    padding: 5px 8px; border-radius: 2px; font-size: 13px; font-family: inherit; min-width: 200px;
  }
  .f-inp:focus { outline: none; border-color: var(--hg); }
  .f-sel { border: 1px solid var(--bdl); background: #fff; color: var(--tx); padding: 5px 8px; border-radius: 2px; font-size: 13px; font-family: inherit; }
  #ed-tabs { display: flex; border-bottom: 1px solid var(--bdl); }
  .ed-tab {
    padding: 5px 12px; cursor: pointer; font-size: 12px;
    border: 1px solid transparent; border-bottom: none; border-radius: 2px 2px 0 0;
    margin-bottom: -1px; color: var(--txl); background: var(--hl);
  }
  .ed-tab.on { background: var(--abg); border-color: var(--bdl); color: var(--hg); font-weight: bold; }
  #md-tb {
    display: flex; gap: 2px; padding: 4px 6px;
    background: var(--hl); border: 1px solid var(--bdl); border-bottom: none; flex-wrap: wrap;
  }
  .tb-btn {
    border: 1px solid var(--bdl); background: var(--abg); color: var(--txl);
    padding: 2px 6px; border-radius: 2px; cursor: pointer;
    font-size: 11px; font-family: monospace; font-weight: bold;
  }
  .tb-btn:hover { background: var(--hg); color: #fff; border-color: var(--hg); }
  #ed-content {
    width: 100%; min-height: 360px;
    border: 1px solid var(--bdl); background: #fff; color: var(--tx);
    padding: 10px; font-size: 13px; font-family: 'Malgun Gothic', monospace;
    resize: vertical; line-height: 1.7;
  }
  #ed-content:focus { outline: none; border-color: var(--hg); }
  #ed-preview {
    width: 100%; min-height: 360px; border: 1px solid var(--bdl);
    background: #fff; padding: 10px; display: none; overflow-y: auto;
  }
  .ed-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .save-btn {
    background: var(--hg); border: 1px solid var(--hgd); color: #fff;
    padding: 7px 20px; border-radius: 2px; cursor: pointer;
    font-size: 13px; font-weight: bold; font-family: inherit;
  }
  .save-btn:hover { background: var(--hgd); }
  .cancel-btn {
    background: var(--hl); border: 1px solid var(--bdl); color: var(--txl);
    padding: 7px 16px; border-radius: 2px; cursor: pointer;
    font-size: 13px; font-family: inherit;
  }
  .cancel-btn:hover { background: var(--bdl); }

  /* ── Toast & Modal ─────────────────── */
  #toast {
    position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
    padding: 9px 16px; border-radius: 3px; font-size: 13px;
    box-shadow: 0 3px 10px var(--sh); z-index: 9999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--abg); border: 1px solid var(--bd); border-radius: 4px;
    padding: 20px; max-width: 500px; width: 100%; box-shadow: 0 8px 24px var(--sh);
  }
  .modal h3 { font-size: 15px; color: var(--hg); margin-bottom: 12px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .modal textarea {
    width: 100%; height: 200px; border: 1px solid var(--bdl); background: var(--hl);
    color: var(--tx); padding: 8px; font-size: 11px; font-family: monospace;
    border-radius: 2px; resize: vertical;
  }
  .modal p { font-size: 12px; color: var(--txl); margin-bottom: 8px; }

  @media (max-width: 768px) {
    #sidebar { display: none; }
    .wiki-toc { max-width: 100%; display: block; }
    #post-list th:nth-child(4), #post-list td:nth-child(4),
    #post-list th:nth-child(5), #post-list td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="logo">📖 <em>도현</em>위키</div>
    <div id="search-wrap">
      <input type="text" id="search-input" placeholder="문서 검색..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="s-btn" onclick="doSearch()">검색</button>
      <button class="s-btn" onclick="clearSearch()" style="background:rgba(0,0,0,0.3)">×</button>
    </div>
    <div id="header-tools">
      <button class="h-btn" id="dark-btn" onclick="toggleDark()">🌙 다크</button>
      <button class="h-btn" onclick="showBackupModal()">백업</button>
      <button class="h-btn" onclick="showRestoreModal()">복원</button>
    </div>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="side-sec">
      <div class="side-hd">카테고리</div>
      <div class="side-it on" onclick="filterCat('')" id="cat-all">
        <span>🗂</span> 전체글 <span class="side-cnt" id="cnt-all">0</span>
      </div>
      <div class="side-it" onclick="filterCat('마케팅')" id="cat-마케팅">
        <span>📊</span> 마케팅 <span class="side-cnt" id="cnt-마케팅">0</span>
      </div>
      <div class="side-it" onclick="filterCat('창작론')" id="cat-창작론">
        <span>✍️</span> 창작론 <span class="side-cnt" id="cnt-창작론">0</span>
      </div>
      <div class="side-it" onclick="filterCat('생활팁')" id="cat-생활팁">
        <span>💡</span> 생활팁 <span class="side-cnt" id="cnt-생활팁">0</span>
      </div>
      <div class="side-it" onclick="filterCat('__bookmark__')" id="cat-bookmark">
        <span>⭐</span> 북마크 <span class="side-cnt" id="cnt-bookmark">0</span>
      </div>
    </div>
    <div class="side-sec">
      <div class="side-hd">태그</div>
      <div id="tag-cloud"></div>
    </div>
  </div>

  <div id="main">

    <!-- List View -->
    <div id="list-view">
      <div id="board-hdr">
        <div id="board-ttl">전체 문서 목록</div>
        <div id="board-ctrl">
          <select class="ctrl-sel" id="sort-sel" onchange="applySort()">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
            <option value="title">제목순</option>
            <option value="views">조회순</option>
          </select>
          <button class="write-btn" onclick="showEditor()">✏ 새 문서</button>
        </div>
      </div>
      <table id="post-list">
        <thead>
          <tr>
            <th style="width:38px">번호</th>
            <th style="width:65px">분류</th>
            <th>제목</th>
            <th style="width:88px">작성일</th>
            <th style="width:46px">조회</th>
            <th style="width:28px">★</th>
          </tr>
        </thead>
        <tbody id="post-tbody"></tbody>
      </table>
      <div id="no-res" class="no-res" style="display:none">검색 결과가 없습니다.</div>
      <div id="pagination"></div>

    tags:['퍼널','AIDA','전환율','고객여정'],
    content:`# 퍼널 마케팅 완전 정복\n\n## 퍼널이란?\n\n마케팅 퍼널(Marketing Funnel)은 잠재 고객이 **최초 인지**에서 **구매 결정**까지 이르는 과정을 깔때기(funnel) 모양으로 시각화한 모델입니다.[*마케팅 퍼널 개념은 1898년 E. St. Elmo Lewis가 처음 제안했습니다.]\n\n## AIDA 모델\n\n| 단계 | 의미 | 핵심 액션 |\n|------|------|----------|\n| **A**wareness | 인지 | 노출, 광고, SNS |\n| **I**nterest | 관심 | 콘텐츠, 블로그 |\n| **D**esire | 욕구 | 리뷰, 사례연구 |\n| **A**ction | 행동 | CTA, 할인, 보증 |\n\n## 퍼널 단계별 전략\n\n### 1. 상단 퍼널 (TOFU)\n- 브랜드 인지도 확대\n- 콘텐츠 마케팅, SEO, SNS 광고\n- **목표**: 최대한 많은 잠재 고객 유입\n\n### 2. 중단 퍼널 (MOFU)\n- 관심 고객 육성 (Lead Nurturing)\n- 이메일 시퀀스, 웨비나, 무료 체험\n- **목표**: 신뢰 구축 및 구매 의향 높이기\n\n### 3. 하단 퍼널 (BOFU)\n- 구매 전환 극대화\n- 개인화 제안, 한정 혜택, 재타겟팅\n- **목표**: 실제 구매로 전환\n\n## 핵심 지표\n\n> 전환율 = (다음 단계 진입자 수 / 현재 단계 진입자 수) × 100\n\n- **클릭률(CTR)**: 광고 효율 측정\n- **리드 전환율**: TOFU → MOFU 효율\n- **구매 전환율**: 최종 성과 지표\n- **고객 획득 비용(CAC)**: 효율성 측정\n\n관련 문서: [[콘텐츠 마케팅 전략 가이드]]`,
    date:'2026-01-15', views:47, bookmark:false

  {
    id:2, cat:'마케팅', title:'콘텐츠 마케팅 전략 가이드',
    tags:['콘텐츠','SEO','블로그','인바운드'],
    content:`# 콘텐츠 마케팅 전략 가이드\n\n## 콘텐츠 마케팅이란?\n\n**콘텐츠 마케팅**은 광고 대신 가치 있는 정보와 이야기로 고객을 끌어당기는 인바운드 마케팅의 핵심 전략입니다.\n\n> "팔려고 하지 말고, 도움이 되어라." — 콘텐츠 마케팅의 황금률\n\n## 콘텐츠 유형별 특성\n\n### 블로그 포스트\n- SEO 효과 극대화\n- 롱테일 키워드 공략\n- 전문성 어필에 최적\n\n### 영상 콘텐츠\n- 유튜브, 릴스, 쇼츠\n- 참여율이 텍스트 대비 3배 높음[*Nielsen 2023 보고서 기준]\n- 브랜드 인지도 빠른 상승\n\n### 인포그래픽\n- 복잡한 정보를 시각화\n- 공유율 높음\n- 링크 빌딩에 유리\n\n## 콘텐츠 캘린더 구성\n\n1. **월 1~2개**: 심층 롱폼 콘텐츠 (기둥 콘텐츠)\n2. **주 2~3개**: 블로그 포스트\n3. **매일**: SNS 마이크로 콘텐츠\n\n## SEO 최적화 체크리스트\n\n- [ ] 타겟 키워드 포함 (제목, H2, 본문)\n- [ ] 메타 디스크립션 작성\n- [ ] 내부 링크 구조 최적화\n- [ ] 이미지 alt 태그 작성\n- [ ] 페이지 로딩 속도 확인\n\n[[퍼널 마케팅 완전 정복]]과 함께 읽으면 좋습니다.`,
    date:'2026-01-20', views:38, bookmark:true
  },
  {
    id:3, cat:'마케팅', title:'그로스해킹: 데이터 드리븐 성장 전략',
    tags:['그로스해킹','AARRR','PMF','스타트업'],
    content:`# 그로스해킹: 데이터 드리븐 성장 전략\n\n## 그로스해킹이란?\n\n그로스해킹(Growth Hacking)은 **데이터와 실험**을 기반으로 빠른 성장을 추구하는 마케팅 방법론입니다. 숀 엘리스(Sean Ellis)가 2010년 처음 제시했습니다.[*Sean Ellis는 Dropbox의 초기 성장을 이끈 마케터로, "growth hacker"라는 용어를 만들었습니다.]\n\n## AARRR 프레임워크 (해적 지표)\n\n- **Acquisition**: 사용자 획득 (어떻게 알게 되었나?)\n- **Activation**: 활성화 (첫 경험이 좋았나?)\n- **Retention**: 유지 (다시 돌아오는가?)\n- **Revenue**: 수익 (돈을 지불하는가?)\n- **Referral**: 추천 (다른 사람에게 알리는가?)\n\n## Product-Market Fit 찾기\n\n> "40% 이상의 사용자가 '이 제품이 없어지면 매우 실망할 것이다'라고 답하면 PMF 달성"\n\n### PMF 확인 방법\n1. **Sean Ellis Test**: 위 기준 설문조사\n2. **리텐션 커브**: 평평해지면 PMF 신호\n3. **NPS 점수**: 50 이상이면 강한 PMF\n\n## 성장 루프 설계\n\n### 바이럴 루프\n사용자 → 제품 사용 → 친구 초대 → 신규 사용자\n\n### 실험 프레임워크\n1. **가설 설정**: "~를 하면 ~가 X% 증가할 것이다"\n2. **우선순위 결정**: ICE 스코어 (Impact × Confidence × Ease)\n3. **A/B 테스트 실행**: 통계적 유의성 확보\n4. **결과 분석**: 학습 내용 문서화`,
    date:'2026-01-28', views:52, bookmark:false
  },
  {
    id:4, cat:'창작론', title:'3막 구조: 이야기의 뼈대',
    tags:['3막구조','시나리오','스토리텔링','극작'],
    content:`# 3막 구조: 이야기의 뼈대\n\n## 개요\n\n3막 구조는 아리스토텔레스의 《시학》에서 기원한 서사의 기본 틀입니다.[*아리스토텔레스의 《시학》(Poetics)은 기원전 335년경 저술된 것으로 추정됩니다.] 할리우드부터 소설, 게임까지 가장 널리 쓰이는 이야기 구조입니다.\n\n## 1막: 설정 (Setup)\n\n### 목표\n- 세계관과 주인공 소개\n- 감정적 투자 유도\n- 이야기의 문제 제시\n\n### 핵심 요소\n- **오프닝 이미지**: 이야기의 톤 설정\n- **주제 제시**: 독자에게 던지는 질문\n- **전환점 1**: 주인공을 2막으로 밀어넣는 사건\n\n## 2막: 대립 (Confrontation)\n\n### 핵심 요소\n- **B스토리**: 주제를 강화하는 서브플롯\n- **중간점**: 이야기의 전환 - 가짜 승리 또는 가짜 패배\n- **어둠의 밤**: 주인공의 최저점\n- **전환점 2**: 클라이맥스로의 돌입\n\n## 3막: 해결 (Resolution)\n\n### 핵심 요소\n- **클라이맥스**: 최종 대결/결정\n- **결말**: 새로운 균형 상태\n- **클로징 이미지**: 오프닝과 대비\n\n## 실전 적용\n\n> 이야기를 쓸 때 먼저 묻자: "내 캐릭터는 어떻게 변하는가?"\n\n1. 주인공의 **외적 목표**와 **내적 욕구** 구분\n2. 각 막의 전환점을 먼저 설계\n3. 역방향으로 채우기 (결말 → 시작)\n\n[[캐릭터 아크: 인물이 변하는 법]]도 함께 참고하세요.`,
    date:'2026-02-05', views:33, bookmark:true

  {
    id:5, cat:'창작론', title:'캐릭터 아크: 인물이 변하는 법',
    tags:['캐릭터','인물호','성장','변화'],
    content:`# 캐릭터 아크: 인물이 변하는 법\n\n## 캐릭터 아크란?\n\n캐릭터 아크(Character Arc)는 이야기 속에서 주인공이 겪는 **내면의 변화 여정**입니다.\n\n## 3가지 아크 유형\n\n### 1. 긍정적 변화 아크 (Positive Change Arc)\n결함 → 믿음의 거짓 → 도전 → 진실 수용 → 성장\n\n**예시**: 《알라딘》 - 거짓말쟁이 → 자기 자신으로 충분함을 깨달음\n\n### 2. 부정적 변화 아크 (Negative Change Arc)\n도덕적 결함 → 거짓 믿음 강화 → 비극적 선택 → 몰락\n\n**예시**: 《맥베스》 - 야망 → 죄책감 무시 → 완전한 타락\n\n### 3. 평탄한 아크 (Flat Arc)\n이미 진실을 아는 캐릭터 → 세계를 변화시킴\n\n## 캐릭터 아크 설계 방법\n\n### Step 1: 결함(Flaw) 설정\n주인공이 이야기 초반에 가진 심리적 약점\n- 예: "버림받을까봐 아무도 믿지 못한다"\n\n### Step 2: 거짓 믿음(Lie) 설정\n결함에서 비롯된 잘못된 세계관\n- "믿으면 반드시 배신당한다"\n\n### Step 3: 진실(Truth) 설정\n이야기가 캐릭터에게 가르쳐야 할 것\n- "진정한 신뢰는 위험을 감수해야 한다"\n\n## 강력한 캐릭터 아크의 법칙\n\n1. **외적 갈등이 내적 변화를 강요해야** 한다\n2. 캐릭터는 **능동적으로** 변화를 선택해야 한다\n3. 변화는 **점진적**이어야 한다`,
    date:'2026-02-12', views:28, bookmark:false
  },
  {
    id:6, cat:'창작론', title:'복선과 떡밥: 독자를 사로잡는 기술',
    tags:['복선','떡밥회수','미스터리','서스펜스'],
    content:`# 복선과 떡밥: 독자를 사로잡는 기술\n\n## 복선(Foreshadowing)이란?\n\n복선은 이후 사건을 암시하는 장치로, 독자에게 **"아, 그래서 그랬구나!"**라는 쾌감을 선사합니다.\n\n> "좋은 복선은 재독 시에만 보인다."\n\n## 복선의 종류\n\n### 1. 명시적 복선\n독자가 인지할 수 있는 직접적인 암시\n\n### 2. 은유적 복선\n상징이나 이미지로 암시\n- 죽음을 앞둔 인물 곁의 시들어가는 꽃\n- 폭풍 전의 고요한 날씨\n\n### 3. 구조적 복선\n- 1막의 장면이 3막에서 반전되거나 반복\n\n## 체호프의 총 법칙\n\n> 1막에서 벽에 총이 걸려 있다면, 3막에서는 반드시 발사되어야 한다.\n\n이야기에 등장하는 모든 요소는 반드시 의미 있게 사용되어야 한다.[*안톤 체호프(Anton Chekhov, 1860-1904)가 남긴 이 원칙은 경제적 서술의 핵심입니다.]\n\n## 효과적인 복선 기법\n\n### 레드 헤링 (Red Herring)\n독자를 잘못된 방향으로 유도하는 **가짜 복선**\n- 미스터리 장르에서 핵심 기법\n\n### 씨앗 뿌리기 (Planting)\n나중에 중요해질 정보를 자연스럽게 심기\n\n## 실전 체크리스트\n\n- [ ] 모든 핵심 반전에 3개 이상의 복선이 있는가?\n- [ ] 복선이 너무 명확하지는 않은가?\n- [ ] 1막에서 등장한 요소들이 모두 회수되었는가?`,
    date:'2026-02-20', views:41, bookmark:true
  },

let posts = [];
let currentCat = '';
let currentSearch = '';
let currentSort = 'newest';
let currentPage = 1;
const PAGE_SIZE = 15;
let viewingPostId = null;
let editingPostId = null;
let _footnotes = [];

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { posts = JSON.parse(raw); }
    else { posts = JSON.parse(JSON.stringify(DEFAULT_POSTS)); saveData(); }
  } catch(e) { posts = JSON.parse(JSON.stringify(DEFAULT_POSTS)); }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); }

function parseMarkdown(md) {
  if (!md) return '';
  _footnotes = [];
  const fnRefs = [];
  const wlRefs = [];

  // 1. Extract footnotes [*text]
  md = md.replace(/\[\*([^\]]*)\]/g, (_, text) => {
    const n = fnRefs.length + 1;
    fnRefs.push(text);
    return '__FN' + n + '__';
  });

  // 2. Extract wiki links [[title|display]] or [[title]]
  md = md.replace(/\[\[([^\]]+)\]\]/g, (_, inner) => {
    const parts = inner.split('|');
    const title = parts[0].trim();
    const display = (parts[1] || parts[0]).trim();
    const idx = wlRefs.length;
    wlRefs.push({title, display});
    return '__WL' + idx + '__';
  });

  // 3. Parse markdown (marked.js primary, custom fallback)
  let html;
  if (typeof marked !== 'undefined') {
    try {
      marked.setOptions({ breaks: true, gfm: true });
      html = marked.parse(md);
    } catch(e) { html = _markdownFallback(md); }
  } else {
    html = _markdownFallback(md);
  }

  // 4. Replace footnote placeholders
  fnRefs.forEach((text, i) => {
    const n = i + 1;
    _footnotes.push({n, text});
    html = html.split('__FN' + n + '__').join(
      `<sup class="fn-ref" onclick="scrollToFn(${n})">[${n}]</sup>`
    );
  });

  // 5. Replace wiki link placeholders
  wlRefs.forEach((wl, i) => {
    const found = posts.find(p => p.title === wl.title);
    const replacement = found
      ? `<a class="wl" onclick="viewPost(${found.id})">${esc(wl.display)}</a>`
      : `<span class="wl-new" title="문서 없음: ${esc(wl.title)}">${esc(wl.display)}</span>`;
    html = html.split('__WL' + i + '__').join(replacement);
  });

  return html;
}

function _markdownFallback(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^&gt; (.+)$/gm,'<blockquote><p>$1</p></blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\[ \] /g,'<input type="checkbox" disabled> ')
    .replace(/\[x\] /g,'<input type="checkbox" disabled checked> ')
    .replace(/^- (.+)$/gm,'<li class="_ul">$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li class="_ol">$1</li>');
  const lines = html.split('\n');
  const out = [];
  let inTable = false, headerDone = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (/^\|.+\|$/.test(line)) {
      if (!inTable) { out.push('<table>'); inTable = true; headerDone = false; }
      if (/^\|[-:\s|]+\|$/.test(line)) { headerDone = true; continue; }
      const cells = line.slice(1,-1).split('|').map(c=>c.trim());
      const tag = !headerDone ? 'th' : 'td';
      out.push('<tr>' + cells.map(c=>`<${tag}>${c}</${tag}>`).join('') + '</tr>');
    } else {
      if (inTable) { out.push('</table>'); inTable = false; }
      out.push(line);
    }
  }
  if (inTable) out.push('</table>');
  html = out.join('\n');
  html = html.replace(/(<li class="_ul">[^]*?<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  html = html.replace(/(<li class="_ol">[^]*?<\/li>\n?)+/g, m => '<ol>' + m + '</ol>');
  html = html.replace(/ class="_ul"| class="_ol"/g, '');
  html = html.split('\n\n').map(block => {
    const t = block.trim();
    if (!t) return '';
    if (/^<(h[1-6]|pre|ul|ol|blockquote|hr|table|tr|input)/.test(t)) return t;
    return '<p>' + t.replace(/\n/g,'<br>') + '</p>';
  }).join('\n');
  return html;
}

function viewPost(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  p.views = (p.views||0)+1;
  saveData();
  viewingPostId = id;

  document.getElementById('pv-cat').textContent = '[' + p.cat + ']';
  document.getElementById('pv-title').textContent = p.title;
  document.getElementById('pv-date').textContent = p.date;
  document.getElementById('pv-views').textContent = p.views;

  const bodyEl = document.getElementById('pv-body');
  bodyEl.innerHTML = parseMarkdown(p.content);

  // Gather heading data (before modifying DOM)
  const headings = bodyEl.querySelectorAll('h2, h3');
  let h2c = 0, h3c = 0;
  const headingData = [];
  headings.forEach((h, i) => {
    h.id = 'sec-' + i;
    let num;
    if (h.tagName === 'H2') { h2c++; h3c = 0; num = String(h2c); }
    else { h3c++; num = h2c + '.' + h3c; }
    headingData.push({el: h, num, text: h.textContent.trim()});
  });

  // Build and insert TOC
  if (headingData.length >= 2) {
    const toc = buildTOC(headingData);
    bodyEl.insertBefore(toc, bodyEl.firstChild);
  }

  // Add section numbers + edit buttons
  headingData.forEach(({el, num}) => {
    const orig = el.innerHTML;
    el.innerHTML = `<span class="sec-text"><span class="sec-num">${num}.</span> ${orig}</span><button class="sec-edit" onclick="editCurrentPost()">[편집]</button>`;
  });

  // Footnotes section
  if (_footnotes.length > 0) {
    const fnSec = document.createElement('div');
    fnSec.className = 'fn-section';
    fnSec.innerHTML = '<div class="fn-section-hd">각주</div>' +
      _footnotes.map(fn =>
        `<div class="fn-item" id="fn-${fn.n}"><span class="fn-num">[${fn.n}]</span><span>${fn.text}</span></div>`
      ).join('');
    bodyEl.appendChild(fnSec);
  }

  // Tags
  const tagsRow = document.getElementById('pv-tags-row');
  if (p.tags && p.tags.length) {
    tagsRow.innerHTML = '<span class="wiki-tags-lbl">분류:</span>' +
      p.tags.map(t=>`<span class="tag" onclick="filterTag('${esc(t)}')">${esc(t)}</span>`).join('');
    tagsRow.style.display = 'flex';
  } else { tagsRow.style.display = 'none'; }

  document.getElementById('pv-bm-btn').textContent = p.bookmark ? '★ 북마크 해제' : '☆ 북마크';
  showView('post');
  window.scrollTo(0,0);
}

function buildTOC(headingData) {
  const toc = document.createElement('div');
  toc.className = 'wiki-toc';

  const hd = document.createElement('div');
  hd.className = 'wiki-toc-hd';
  hd.textContent = '목차';
  toc.appendChild(hd);

  const ol = document.createElement('ol');
  headingData.forEach(({el, num, text}) => {
    const li = document.createElement('li');
    if (el.tagName === 'H3') li.className = 'toc-sub';
    const a = document.createElement('a');
    a.textContent = num + '. ' + text;
    a.href = '#' + el.id;
    a.onclick = (e) => { e.preventDefault(); el.scrollIntoView({behavior:'smooth', block:'start'}); };
    li.appendChild(a);
    ol.appendChild(li);
  });
  toc.appendChild(ol);
  return toc;
}

function scrollToFn(n) {
  const el = document.getElementById('fn-' + n);
  if (el) el.scrollIntoView({behavior:'smooth'});
}

function getFilteredPosts() {
  let filtered = [...posts];
  if (currentCat === '__bookmark__') filtered = filtered.filter(p=>p.bookmark);
  else if (currentCat) filtered = filtered.filter(p=>p.cat===currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(p=>
      p.title.toLowerCase().includes(q) ||
      p.content.toLowerCase().includes(q) ||
      (p.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  switch(currentSort) {
    case 'newest': filtered.sort((a,b)=>b.id-a.id); break;
    case 'oldest': filtered.sort((a,b)=>a.id-b.id); break;
    case 'title': filtered.sort((a,b)=>a.title.localeCompare(b.title,'ko')); break;
    case 'views': filtered.sort((a,b)=>b.views-a.views); break;
  }
  return filtered;
}

function renderList() {
  const filtered = getFilteredPosts();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  const pageItems = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const tbody = document.getElementById('post-tbody');
  const noRes = document.getElementById('no-res');

  if (!pageItems.length) {
    tbody.innerHTML = '';
    noRes.style.display = 'block';
  } else {
    noRes.style.display = 'none';
    tbody.innerHTML = pageItems.map((p,i) => {
      const num = total - (currentPage-1)*PAGE_SIZE - i;
      const tags = (p.tags||[]).map(t=>`<span class="tag" onclick="event.stopPropagation();filterTag('${esc(t)}')">${esc(t)}</span>`).join('');
      const star = p.bookmark ? '★' : '☆';
      return `<tr onclick="viewPost(${p.id})">
        <td class="p-num">${num}</td>
        <td><span class="p-cat cat-${p.cat}">${p.cat}</span></td>
        <td class="p-title-cell">
          <div class="p-title-lk">${esc(p.title)}</div>
          ${tags?`<div class="p-tags">${tags}</div>`:''}
        </td>
        <td class="p-date">${p.date}</td>
        <td class="p-views">${p.views}</td>
        <td class="p-star${p.bookmark?' on':''}" onclick="event.stopPropagation();toggleBookmark(${p.id})">${star}</td>
      </tr>`;
    }).join('');
  }

  renderPagination(totalPages);
  const catCounts={};
  posts.forEach(p=>{catCounts[p.cat]=(catCounts[p.cat]||0)+1;});
  document.getElementById('stats-bar').innerHTML =
    `<span>전체: ${posts.length}개</span>` +
    Object.entries(catCounts).map(([k,v])=>`<span>${k}: ${v}개</span>`).join('') +
    `<span>북마크: ${posts.filter(p=>p.bookmark).length}개</span>` +
    (currentSearch?`<span style="color:var(--hg)">검색: ${filtered.length}개</span>`:'');

  updateSideCounts();
  updateTagCloud();
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="pg-btn" onclick="gotoPage(${currentPage-1})">◀</button>`;
  const start = Math.max(1, currentPage-2);
  const end = Math.min(totalPages, start+4);
  for (let i=start; i<=end; i++)
    html += `<button class="pg-btn${i===currentPage?' on':''}" onclick="gotoPage(${i})">${i}</button>`;
  if (currentPage < totalPages) html += `<button class="pg-btn" onclick="gotoPage(${currentPage+1})">▶</button>`;
  pg.innerHTML = html;
}

function updateSideCounts() {
  document.getElementById('cnt-all').textContent = posts.length;
  ['마케팅','창작론','생활팁'].forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if (el) el.textContent = posts.filter(p=>p.cat===c).length;
  });
  document.getElementById('cnt-bookmark').textContent = posts.filter(p=>p.bookmark).length;
}

function updateTagCloud() {
  const tagMap = {};
  posts.forEach(p=>(p.tags||[]).forEach(t=>{tagMap[t]=(tagMap[t]||0)+1;}));
  const sorted = Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById('tag-cloud').innerHTML = sorted.map(([t,c])=>
    `<span class="tag" onclick="filterTag('${esc(t)}')" title="${c}개">${esc(t)}</span>`
  ).join('');
}

function showView(name) {
  document.getElementById('list-view').style.display = name==='list'?'block':'none';
  document.getElementById('post-view').style.display = name==='post'?'block':'none';
  document.getElementById('editor-view').style.display = name==='editor'?'block':'none';
}

function showList() {
  showView('list'); renderList(); viewingPostId = null; editingPostId = null;
}

function showEditor(editId) {
  editingPostId = editId || null;
  if (editId) {
    const p = posts.find(x=>x.id===editId);
    if (!p) return;
    document.getElementById('ed-hdr').textContent = '✏ 문서 수정: ' + p.title;
    document.getElementById('ed-cat').value = p.cat;
    document.getElementById('ed-title').value = p.title;
    document.getElementById('ed-tags').value = (p.tags||[]).join(', ');
    document.getElementById('ed-content').value = p.content;
  } else {
    document.getElementById('ed-hdr').textContent = '✏ 새 문서 작성';
    document.getElementById('ed-cat').value = '마케팅';
    document.getElementById('ed-title').value = '';
    document.getElementById('ed-tags').value = '';
    document.getElementById('ed-content').value = '';
  }
  switchTab('edit');
  showView('editor');
  window.scrollTo(0,0);
  setTimeout(()=>document.getElementById('ed-title').focus(),100);
}

function cancelEdit() {
  if (editingPostId) viewPost(editingPostId);
  else showList();
}

function savePost() {
  const title = document.getElementById('ed-title').value.trim();
  const cat = document.getElementById('ed-cat').value;
  const content = document.getElementById('ed-content').value;
  const tags = document.getElementById('ed-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if (!title) { showToast('제목을 입력해주세요.'); return; }
  if (!content.trim()) { showToast('내용을 입력해주세요.'); return; }
  const today = new Date().toISOString().slice(0,10);
  if (editingPostId) {
    const p = posts.find(x=>x.id===editingPostId);
    if (p) { p.title=title; p.cat=cat; p.content=content; p.tags=tags; }
    saveData(); showToast('문서가 수정되었습니다!'); viewPost(editingPostId);
  } else {
    const newId = posts.length > 0 ? Math.max(...posts.map(p=>p.id))+1 : 1;
    posts.push({id:newId,cat,title,tags,content,date:today,views:0,bookmark:false});
    saveData(); showToast('새 문서가 저장되었습니다!'); viewPost(newId);
  }
}

function editCurrentPost() { if (viewingPostId) showEditor(viewingPostId); }

function deleteCurrentPost() {
  if (!viewingPostId) return;
  const p = posts.find(x=>x.id===viewingPostId);
  if (!p || !confirm('"'+p.title+'" 문서를 삭제하시겠습니까?')) return;
  posts = posts.filter(x=>x.id!==viewingPostId);
  saveData(); showToast('문서가 삭제되었습니다.'); showList();
}

function filterCat(cat) {
  currentCat = cat; currentPage = 1; currentSearch = '';
  document.getElementById('search-input').value = '';
  ['all','마케팅','창작론','생활팁','bookmark'].forEach(c => {
    const el = document.getElementById('cat-'+c);
    if (el) el.classList.remove('on');
  });
  const key = cat==='__bookmark__'?'bookmark':(cat||'all');
  const el = document.getElementById('cat-'+key);
  if (el) el.classList.add('on');
  const titles={'':'전체 문서 목록','마케팅':'마케팅 문서','창작론':'창작론 문서','생활팁':'생활팁 문서','__bookmark__':'북마크한 문서'};
  document.getElementById('board-ttl').textContent = titles[cat] || cat;
  showView('list'); renderList();
}

function filterTag(tag) {
  currentSearch=tag; currentCat=''; currentPage=1;
  document.getElementById('search-input').value=tag;
  showView('list'); renderList();
}

function doSearch() {
  currentSearch=document.getElementById('search-input').value.trim();
  currentPage=1; showView('list'); renderList();
}

function clearSearch() {
  currentSearch=''; document.getElementById('search-input').value=''; renderList();
}

function applySort() {
  currentSort=document.getElementById('sort-sel').value; currentPage=1; renderList();
}

function gotoPage(n) { currentPage=n; renderList(); window.scrollTo(0,0); }

function toggleBookmark(id) {
  const p=posts.find(x=>x.id===id);
  if(p){p.bookmark=!p.bookmark;saveData();renderList();}
}

function toggleBookmarkCurrent() {
  if(!viewingPostId)return;
  const p=posts.find(x=>x.id===viewingPostId);
  if(p){
    p.bookmark=!p.bookmark; saveData();
    document.getElementById('pv-bm-btn').textContent=p.bookmark?'★ 북마크 해제':'☆ 북마크';
    showToast(p.bookmark?'북마크에 추가되었습니다.':'북마크에서 제거되었습니다.');
  }
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  localStorage.setItem('dhyun_wiki_dark',isDark?'1':'0');
  document.getElementById('dark-btn').textContent=isDark?'☀️ 라이트':'🌙 다크';
}

function switchTab(tab) {
  const tabs=document.querySelectorAll('.ed-tab');
  tabs[0].classList.toggle('on',tab==='edit');
  tabs[1].classList.toggle('on',tab==='preview');
  const ta=document.getElementById('ed-content');
  const pv=document.getElementById('ed-preview');
  const tb=document.getElementById('md-tb');
  if(tab==='edit'){ta.style.display='block';tb.style.display='flex';pv.style.display='none';}
  else{ta.style.display='none';tb.style.display='none';pv.style.display='block';pv.innerHTML=parseMarkdown(ta.value);}
}

function insMd(before,after) {
  const ta=document.getElementById('ed-content');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.selectionStart=s+before.length;
  ta.selectionEnd=s+before.length+sel.length;
  ta.focus();
}

function showBackupModal() {
  const json=JSON.stringify(posts,null,2);
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>💾 JSON 백업</h3><p>아래 내용을 복사하여 저장해두세요.</p><textarea readonly>${esc(json)}</textarea><div class="modal-btns"><button class="save-btn" onclick="navigator.clipboard.writeText(this.closest('.modal').querySelector('textarea').value).then(()=>showToast('복사 완료!'))">복사</button><button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">닫기</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('textarea').select();
}

function showRestoreModal() {
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>📥 JSON 복원</h3><p>백업한 JSON 데이터를 붙여넣으세요. <strong>기존 데이터가 교체됩니다.</strong></p><textarea placeholder="JSON 데이터를 여기에 붙여넣으세요..."></textarea><div class="modal-btns"><button class="save-btn" onclick="doRestore(this)">복원하기</button><button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">취소</button></div></div>`;
  document.body.appendChild(overlay);
}

function doRestore(btn) {
  try {
    const data=JSON.parse(btn.closest('.modal').querySelector('textarea').value);
    if(!Array.isArray(data))throw new Error('배열 형식이 아닙니다');
    posts=data; saveData();
    btn.closest('.modal-overlay').remove();
    showList(); showToast('데이터가 복원되었습니다!');
  } catch(e){showToast('잘못된 JSON: '+e.message);}
}

let toastTimer=null;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
loadData();
if(localStorage.getItem('dhyun_wiki_dark')==='1'){
  document.body.classList.add('dark');
  document.getElementById('dark-btn').textContent='☀️ 라이트';
}
showList();
</script>
</body>
