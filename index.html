<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도현의 지식위키</title>
<style>
  :root {
    --bg: #f0ece4;
    --bg2: #e8e0d4;
    --bg3: #fff9f0;
    --border: #b8a898;
    --border2: #d0c4b8;
    --text: #2c2416;
    --text2: #5c4a38;
    --text3: #8c7a68;
    --accent: #8b4513;
    --accent2: #a0522d;
    --accent3: #cd853f;
    --link: #6b3410;
    --tag-bg: #d4c4b0;
    --highlight: #fffacd;
    --shadow: rgba(0,0,0,0.15);
    --green: #2d6a4f;
    --red: #9b2335;
  }
  .dark {
    --bg: #1a1510;
    --bg2: #251e16;
    --bg3: #2e2620;
    --border: #4a3c2e;
    --border2: #3a2e22;
    --text: #e8dcc8;
    --text2: #c8b89a;
    --text3: #8a7a68;
    --accent: #cd853f;
    --accent2: #d4915a;
    --accent3: #e8a870;
    --link: #e8a870;
    --tag-bg: #3a2e22;
    --highlight: #2a2010;
    --shadow: rgba(0,0,0,0.4);
    --green: #52b788;
    --red: #e07070;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', Dotum, '돋움', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  #header {
    background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%);
    border-bottom: 3px solid #5c2e0a;
  }
  #header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: rgba(0,0,0,0.1);
  }
  #logo {
    font-size: 20px;
    font-weight: bold;
    color: #fff9f0;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    letter-spacing: -0.5px;
  }
  #logo span { color: #ffd080; }
  #header-tools { display: flex; gap: 6px; align-items: center; }
  .hbtn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .hbtn:hover { background: rgba(255,255,255,0.3); }
  #search-bar {
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 6px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #search-input {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    padding: 5px 8px;
    font-size: 12px;
    border-radius: 3px;
    font-family: inherit;
  }
  #search-input:focus { outline: none; border-color: var(--accent3); }
  .sbtn {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: #fff;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    white-space: nowrap;
  }
  .sbtn:hover { background: var(--accent); }

  #layout {
    display: flex;
    max-width: 1280px;
    margin: 0 auto;
    min-height: calc(100vh - 90px);
  }
  #sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 12px 0;
  }
  #main { flex: 1; overflow: hidden; }

  .side-title {
    background: var(--accent);
    color: #fff;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: bold;
    border-bottom: 1px solid rgba(0,0,0,0.2);
    margin-bottom: 2px;
  }
  .side-item {
    display: flex;
    align-items: center;
    padding: 4px 12px 4px 20px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    border-bottom: 1px solid var(--border2);
    gap: 6px;
  }
  .side-item:hover { background: var(--highlight); color: var(--accent); }
  .side-item.active { background: var(--highlight); color: var(--accent); font-weight: bold; }
  .side-count {
    margin-left: auto;
    background: var(--tag-bg);
    color: var(--text3);
    padding: 1px 5px;
    border-radius: 10px;
    font-size: 10px;
  }

  #board-header {
    background: var(--bg2);
    border-bottom: 2px solid var(--accent);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  #board-title { font-size: 15px; font-weight: bold; color: var(--accent); }
  #board-controls { display: flex; gap: 6px; align-items: center; }
  .ctrl-select {
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-family: inherit;
  }
  .write-btn {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: #fff;
    padding: 4px 14px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    font-family: inherit;
  }
  .write-btn:hover { background: var(--accent); }

  #post-list { width: 100%; border-collapse: collapse; }
  #post-list thead tr { background: var(--bg2); border-bottom: 1px solid var(--border); }
  #post-list th {
    padding: 6px 10px;
    text-align: left;
    font-size: 11px;
    color: var(--text3);
    font-weight: bold;
    border-right: 1px solid var(--border2);
    white-space: nowrap;
  }
  #post-list th:last-child { border-right: none; }
  #post-list tbody tr { border-bottom: 1px solid var(--border2); cursor: pointer; }
  #post-list tbody tr:hover { background: var(--highlight); }
  #post-list td { padding: 8px 10px; font-size: 12px; vertical-align: middle; }
  .post-num { color: var(--text3); text-align: center; width: 40px; }
  .post-cat-badge {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: bold;
    white-space: nowrap;
  }
  .cat-마케팅 { background: #e8d4a0; color: #6b4800; }
  .cat-창작론 { background: #d0e8d0; color: #1a5c1a; }
  .cat-생활팁 { background: #d0d8e8; color: #1a2a5c; }
  .post-title-cell { max-width: 400px; }
  .post-title-link { color: var(--text); font-weight: bold; font-size: 13px; }
  .post-title-link:hover { color: var(--accent); }
  .post-tags { margin-top: 2px; display: flex; gap: 3px; flex-wrap: wrap; }
  .tag {
    display: inline-block;
    padding: 1px 5px;
    background: var(--tag-bg);
    color: var(--text3);
    border-radius: 2px;
    font-size: 10px;
    cursor: pointer;
  }
  .tag:hover { background: var(--accent3); color: #fff; }
  .post-date { color: var(--text3); font-size: 11px; white-space: nowrap; }
  .post-views { color: var(--text3); font-size: 11px; text-align: center; }
  .bookmark-star { color: var(--text3); cursor: pointer; font-size: 14px; text-align: center; }
  .bookmark-star.active { color: #f0a500; }

  #pagination { padding: 12px; display: flex; justify-content: center; gap: 4px; }
  .page-btn {
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text2);
    padding: 4px 9px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .page-btn:hover { background: var(--accent3); color: #fff; }
  .page-btn.active { background: var(--accent); color: #fff; font-weight: bold; }

  #post-view { display: none; }
  #post-view-header {
    background: var(--bg2);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
  }
  .pv-cat { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .pv-title { font-size: 18px; font-weight: bold; color: var(--text); }
  .pv-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 11px; color: var(--text3); flex-wrap: wrap; }
  #post-view-body { padding: 20px; min-height: 300px; line-height: 1.8; border-bottom: 1px solid var(--border); }
  .md-content h1 { font-size: 20px; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 6px; margin: 16px 0 10px; }
  .md-content h2 { font-size: 17px; color: var(--accent2); border-bottom: 1px solid var(--border2); padding-bottom: 4px; margin: 14px 0 8px; }
  .md-content h3 { font-size: 15px; color: var(--text); margin: 12px 0 6px; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { margin: 8px 0 8px 20px; }
  .md-content li { margin: 3px 0; }
  .md-content blockquote { border-left: 3px solid var(--accent3); padding: 6px 12px; background: var(--highlight); margin: 10px 0; color: var(--text2); }
  .md-content code { background: var(--bg2); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; border: 1px solid var(--border2); }
  .md-content pre { background: var(--bg2); padding: 12px; border-radius: 4px; border: 1px solid var(--border); overflow-x: auto; margin: 10px 0; }
  .md-content pre code { background: none; border: none; padding: 0; }
  .md-content strong { color: var(--accent2); }
  .md-content em { color: var(--text2); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .md-content table { border-collapse: collapse; width: 100%; margin: 10px 0; }
  .md-content th { background: var(--bg2); border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .md-content td { border: 1px solid var(--border2); padding: 5px 10px; }
  #post-view-actions {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .pv-tags-row { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .pv-tags-label { font-size: 11px; color: var(--text3); }
  .action-btn {
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
  }
  .action-btn:hover { background: var(--bg2); border-color: var(--accent3); }
  .action-btn.danger { color: var(--red); }
  .action-btn.danger:hover { background: var(--red); color: #fff; border-color: var(--red); }

  #editor-view { display: none; }
  #editor-header {
    background: var(--bg2);
    border-bottom: 2px solid var(--accent);
    padding: 10px 16px;
    font-size: 14px;
    font-weight: bold;
    color: var(--accent);
  }
  #editor-form { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .form-label { font-size: 12px; font-weight: bold; color: var(--text2); min-width: 50px; }
  .form-input {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
    min-width: 200px;
  }
  .form-input:focus { outline: none; border-color: var(--accent3); }
  .form-select {
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 3px;
    font-size: 13px;
    font-family: inherit;
  }
  #editor-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .etab {
    padding: 6px 14px;
    cursor: pointer;
    font-size: 12px;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    margin-bottom: -1px;
    color: var(--text3);
    background: var(--bg2);
  }
  .etab.active { background: var(--bg3); border-color: var(--border); color: var(--accent); font-weight: bold; }
  #md-toolbar {
    display: flex;
    gap: 2px;
    padding: 4px 6px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    flex-wrap: wrap;
  }
  .tbtn {
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    padding: 3px 7px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 11px;
    font-family: monospace;
    font-weight: bold;
  }
  .tbtn:hover { background: var(--accent3); color: #fff; }
  #edit-content {
    width: 100%;
    min-height: 360px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    padding: 10px;
    font-size: 13px;
    font-family: 'Malgun Gothic', monospace;
    resize: vertical;
    border-radius: 0 3px 3px 3px;
    line-height: 1.7;
  }
  #edit-content:focus { outline: none; border-color: var(--accent3); }
  #preview-content {
    width: 100%;
    min-height: 360px;
    border: 1px solid var(--border);
    background: var(--bg3);
    padding: 10px;
    border-radius: 0 3px 3px 3px;
    display: none;
    overflow-y: auto;
  }
  .editor-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .save-btn {
    background: var(--accent2);
    border: 1px solid var(--accent);
    color: #fff;
    padding: 7px 20px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    font-family: inherit;
  }
  .save-btn:hover { background: var(--accent); }
  .cancel-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 16px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .cancel-btn:hover { background: var(--border2); }

  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #fff;
    padding: 10px 18px;
    border-radius: 4px;
    font-size: 13px;
    box-shadow: 0 3px 10px var(--shadow);
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 24px var(--shadow);
  }
  .modal h3 { font-size: 15px; color: var(--accent); margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal textarea {
    width: 100%;
    height: 200px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    padding: 8px;
    font-size: 11px;
    font-family: monospace;
    border-radius: 3px;
    resize: vertical;
  }
  .modal p { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

  #stats-bar {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 4px 16px;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .no-results { padding: 40px; text-align: center; color: var(--text3); font-size: 14px; }

  @media (max-width: 768px) {
    #sidebar { display: none; }
    #post-list th:nth-child(3), #post-list td:nth-child(3),
    #post-list th:nth-child(5), #post-list td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="logo">📚 <span>도현</span>의 지식위키</div>
    <div id="header-tools">
      <button class="hbtn" id="dark-btn" onclick="toggleDark()">🌙 다크모드</button>
      <button class="hbtn" onclick="showBackupModal()">💾 백업</button>
      <button class="hbtn" onclick="showRestoreModal()">📥 복원</button>
    </div>
  </div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="제목, 내용, 태그로 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="sbtn" onclick="doSearch()">🔍 검색</button>
    <button class="sbtn" onclick="clearSearch()" style="background:var(--text3);border-color:var(--text3)">초기화</button>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="side-section">
      <div class="side-title">📂 카테고리</div>
      <div class="side-item active" onclick="filterCat('')" id="cat-all">
        <span>🗂</span> 전체글 <span class="side-count" id="cnt-all">0</span>
      </div>
      <div class="side-item" onclick="filterCat('마케팅')" id="cat-마케팅">
        <span>📊</span> 마케팅 <span class="side-count" id="cnt-마케팅">0</span>
      </div>
      <div class="side-item" onclick="filterCat('창작론')" id="cat-창작론">
        <span>✍️</span> 창작론 <span class="side-count" id="cnt-창작론">0</span>
      </div>
      <div class="side-item" onclick="filterCat('생활팁')" id="cat-생활팁">
        <span>💡</span> 생활팁 <span class="side-count" id="cnt-생활팁">0</span>
      </div>
      <div class="side-item" onclick="filterCat('__bookmark__')" id="cat-bookmark">
        <span>⭐</span> 북마크 <span class="side-count" id="cnt-bookmark">0</span>
      </div>
    </div>
    <div class="side-section">
      <div class="side-title">🏷 태그</div>
      <div id="tag-cloud" style="padding:8px 10px;display:flex;flex-wrap:wrap;gap:4px;"></div>
    </div>
  </div>

  <div id="main">
    <div id="list-view">
      <div id="board-header">
        <div id="board-title">📋 전체 문서 목록</div>
        <div id="board-controls">
          <select class="ctrl-select" id="sort-select" onchange="applySort()">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
            <option value="title">제목순</option>
            <option value="views">조회순</option>
          </select>
          <button class="write-btn" onclick="showEditor()">✏️ 새 글 작성</button>
        </div>
      </div>
      <table id="post-list">
        <thead>
          <tr>
            <th style="width:40px">번호</th>
            <th style="width:70px">카테고리</th>
            <th>제목</th>
            <th style="width:90px">작성일</th>
            <th style="width:50px">조회</th>
            <th style="width:30px">★</th>
          </tr>
        </thead>
        <tbody id="post-tbody"></tbody>
      </table>
      <div id="no-results" class="no-results" style="display:none">🔍 검색 결과가 없습니다.</div>
      <div id="pagination"></div>
      <div id="stats-bar"></div>
    </div>

    <div id="post-view">
      <div id="post-view-header">
        <div class="pv-cat" id="pv-cat"></div>
        <div class="pv-title" id="pv-title"></div>
        <div class="pv-meta">
          <span>📅 <span id="pv-date"></span></span>
          <span>👁 <span id="pv-views"></span>회</span>
        </div>
      </div>
      <div class="pv-tags-row" id="pv-tags-row" style="display:none"></div>
      <div id="post-view-body"><div class="md-content" id="pv-body"></div></div>
      <div id="post-view-actions">
        <button class="action-btn" onclick="showList()">◀ 목록</button>
        <button class="action-btn" id="pv-bookmark-btn" onclick="toggleBookmarkCurrent()">☆ 북마크</button>
        <button class="action-btn" onclick="editCurrentPost()">✏️ 수정</button>
        <button class="action-btn danger" onclick="deleteCurrentPost()">🗑 삭제</button>
      </div>
    </div>

    <div id="editor-view">
      <div id="editor-header">✏️ 새 글 작성</div>
      <div id="editor-form">
        <div class="form-row">
          <span class="form-label">카테고리</span>
          <select class="form-select" id="edit-cat">
            <option>마케팅</option>
            <option>창작론</option>
            <option>생활팁</option>
          </select>
        </div>
        <div class="form-row">
          <span class="form-label">제목</span>

    content:`# 퍼널 마케팅 완전 정복\n\n## 퍼널이란?\n\n마케팅 퍼널(Marketing Funnel)은 잠재 고객이 **최초 인지**에서 **구매 결정**까지 이르는 과정을 깔때기(funnel) 모양으로 시각화한 모델입니다.\n\n## AIDA 모델\n\n| 단계 | 의미 | 핵심 액션 |\n|------|------|----------|\n| **A**wareness | 인지 | 노출, 광고, SNS |\n| **I**nterest | 관심 | 콘텐츠, 블로그 |\n| **D**esire | 욕구 | 리뷰, 사례연구 |\n| **A**ction | 행동 | CTA, 할인, 보증 |\n\n## 퍼널 단계별 전략\n\n### 1. 상단 퍼널 (TOFU)\n- 브랜드 인지도 확대\n- 콘텐츠 마케팅, SEO, SNS 광고\n- **목표**: 최대한 많은 잠재 고객 유입\n\n### 2. 중단 퍼널 (MOFU)\n- 관심 고객 육성 (Lead Nurturing)\n- 이메일 시퀀스, 웨비나, 무료 체험\n- **목표**: 신뢰 구축 및 구매 의향 높이기\n\n### 3. 하단 퍼널 (BOFU)\n- 구매 전환 극대화\n- 개인화 제안, 한정 혜택, 재타겟팅\n- **목표**: 실제 구매로 전환\n\n## 핵심 지표\n\n> 전환율 = (다음 단계 진입자 수 / 현재 단계 진입자 수) × 100\n\n- **클릭률(CTR)**: 광고 효율 측정\n- **리드 전환율**: TOFU → MOFU 효율\n- **구매 전환율**: 최종 성과 지표\n- **고객 획득 비용(CAC)**: 효율성 측정`,

    content:`# 그로스해킹: 데이터 드리븐 성장 전략\n\n## 그로스해킹이란?\n\n그로스해킹(Growth Hacking)은 **데이터와 실험**을 기반으로 빠른 성장을 추구하는 마케팅 방법론입니다. 숀 엘리스(Sean Ellis)가 2010년 처음 제시했습니다.\n\n## AARRR 프레임워크 (해적 지표)\n\n- **Acquisition**: 사용자 획득 (어떻게 알게 되었나?)\n- **Activation**: 활성화 (첫 경험이 좋았나?)\n- **Retention**: 유지 (다시 돌아오는가?)\n- **Revenue**: 수익 (돈을 지불하는가?)\n- **Referral**: 추천 (다른 사람에게 알리는가?)\n\n## Product-Market Fit 찾기\n\n> "40% 이상의 사용자가 '이 제품이 없어지면 매우 실망할 것이다'라고 답하면 PMF 달성"\n\n### PMF 확인 방법\n1. **Sean Ellis Test**: 위 기준 설문조사\n2. **리텐션 커브**: 평평해지면 PMF 신호\n3. **NPS 점수**: 50 이상이면 강한 PMF\n\n## 성장 루프 설계\n\n### 바이럴 루프\n사용자 → 제품 사용 → 친구 초대 → 신규 사용자\n\n### 실험 프레임워크\n1. **가설 설정**: "~를 하면 ~가 X% 증가할 것이다"\n2. **우선순위 결정**: ICE 스코어 (Impact × Confidence × Ease)\n3. **A/B 테스트 실행**: 통계적 유의성 확보\n4. **결과 분석**: 학습 내용 문서화`,

    content:`# 캐릭터 아크: 인물이 변하는 법\n\n## 캐릭터 아크란?\n\n캐릭터 아크(Character Arc)는 이야기 속에서 주인공이 겪는 **내면의 변화 여정**입니다.\n\n## 3가지 아크 유형\n\n### 1. 긍정적 변화 아크 (Positive Change Arc)\n결함 → 믿음의 거짓 → 도전 → 진실 수용 → 성장\n\n**예시**: 《알라딘》 - 거짓말쟁이 → 자기 자신으로 충분함을 깨달음\n\n### 2. 부정적 변화 아크 (Negative Change Arc)\n도덕적 결함 → 거짓 믿음 강화 → 비극적 선택 → 몰락\n\n**예시**: 《맥베스》 - 야망 → 죄책감 무시 → 완전한 타락\n\n### 3. 평탄한 아크 (Flat Arc)\n이미 진실을 아는 캐릭터 → 세계를 변화시킴\n\n## 캐릭터 아크 설계 방법\n\n### Step 1: 결함(Flaw) 설정\n주인공이 이야기 초반에 가진 심리적 약점\n- 예: "버림받을까봐 아무도 믿지 못한다"\n\n### Step 2: 거짓 믿음(Lie) 설정\n결함에서 비롯된 잘못된 세계관\n- "믿으면 반드시 배신당한다"\n\n### Step 3: 진실(Truth) 설정\n이야기가 캐릭터에게 가르쳐야 할 것\n- "진정한 신뢰는 위험을 감수해야 한다"\n\n## 강력한 캐릭터 아크의 법칙\n\n1. **외적 갈등이 내적 변화를 강요해야** 한다\n2. 캐릭터는 **능동적으로** 변화를 선택해야 한다\n3. 변화는 **점진적**이어야 한다`,

    content:`# 복선과 떡밥: 독자를 사로잡는 기술\n\n## 복선(Foreshadowing)이란?\n\n복선은 이후 사건을 암시하는 장치로, 독자에게 **"아, 그래서 그랬구나!"**라는 쾌감을 선사합니다.\n\n> "좋은 복선은 재독 시에만 보인다."\n\n## 복선의 종류\n\n### 1. 명시적 복선\n독자가 인지할 수 있는 직접적인 암시\n\n### 2. 은유적 복선\n상징이나 이미지로 암시\n- 죽음을 앞둔 인물 곁의 시들어가는 꽃\n- 폭풍 전의 고요한 날씨\n\n### 3. 구조적 복선\n- 1막의 장면이 3막에서 반전되거나 반복\n\n## 체호프의 총 법칙\n\n> 1막에서 벽에 총이 걸려 있다면, 3막에서는 반드시 발사되어야 한다.\n\n이야기에 등장하는 모든 요소는 반드시 의미 있게 사용되어야 한다.\n\n## 효과적인 복선 기법\n\n### 레드 헤링 (Red Herring)\n독자를 잘못된 방향으로 유도하는 **가짜 복선**\n- 미스터리 장르에서 핵심 기법\n\n### 씨앗 뿌리기 (Planting)\n나중에 중요해질 정보를 자연스럽게 심기\n\n## 실전 체크리스트\n\n- [ ] 모든 핵심 반전에 3개 이상의 복선이 있는가?\n- [ ] 복선이 너무 명확하지는 않은가?\n- [ ] 1막에서 등장한 요소들이 모두 회수되었는가?`,

    content:`# 시간관리의 기술: GTD와 타임블로킹\n\n## 왜 시간관리가 어려운가?\n\n뇌는 **기억 장치**가 아니라 **처리 장치**입니다. 할 일을 머릿속에 담아두면 인지 부하가 증가하고 실행력이 떨어집니다.\n\n## GTD (Getting Things Done)\n\n데이비드 앨런이 창안한 생산성 시스템\n\n### 5단계 프로세스\n\n1. **수집 (Capture)**: 모든 것을 외부 시스템에 저장\n2. **명확화 (Clarify)**: 각 항목의 다음 액션 결정\n3. **정리 (Organize)**: 적절한 위치에 배치\n4. **검토 (Reflect)**: 정기적으로 시스템 검토\n5. **실행 (Engage)**: 맥락에 맞는 일 처리\n\n### GTD 핵심 원칙\n\n> "2분 안에 할 수 있으면 지금 당장 해라"\n\n## 타임블로킹 (Time Blocking)\n\n캘린더에 **모든 활동을 블록**으로 예약하는 방법\n\n### 기본 원칙\n\n1. **딥워크 블록**: 집중이 필요한 작업 (2~4시간)\n2. **행정 블록**: 이메일, 회의 등 (30분~1시간)\n3. **완충 블록**: 예상치 못한 일 처리용 (1시간)\n\n## MIT (Most Important Task)\n\n매일 아침 **3개 이하**의 가장 중요한 과제를 선정\n- 그날 다른 것은 하지 못해도 MIT만은 반드시 완료\n- 에너지가 높은 아침에 먼저 처리`,

let posts = [];
let currentCat = '';
let currentSearch = '';
let currentSort = 'newest';
let currentPage = 1;
const PAGE_SIZE = 15;
let viewingPostId = null;
let editingPostId = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { posts = JSON.parse(raw); }
    else { posts = JSON.parse(JSON.stringify(DEFAULT_POSTS)); saveData(); }
  } catch(e) { posts = JSON.parse(JSON.stringify(DEFAULT_POSTS)); }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); }

function parseMarkdown(md) {
  if (!md) return '';
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\[ \] /g,'<input type="checkbox" disabled> ')
    .replace(/\[x\] /g,'<input type="checkbox" disabled checked> ')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>');

  // Table processing
  const lines = html.split('\n');
  const out = [];
  let inTable = false;
  let headerDone = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (/^\|.+\|$/.test(line)) {
      if (!inTable) { out.push('<table>'); inTable = true; headerDone = false; }
      if (/^\|[-:\s|]+\|$/.test(line)) { headerDone = true; continue; }
      const cells = line.slice(1,-1).split('|').map(c=>c.trim());
      const tag = (!headerDone) ? 'th' : 'td';
      out.push('<tr>' + cells.map(c=>`<${tag}>${c}</${tag}>`).join('') + '</tr>');
    } else {
      if (inTable) { out.push('</table>'); inTable = false; }
      out.push(line);
    }
  }
  if (inTable) out.push('</table>');
  html = out.join('\n');

  // Wrap list items
  html = html.replace(/(<li>[^]*?<\/li>\n?)+/g, m => {
    if (m.includes('<ul>') || m.includes('<ol>')) return m;
    return '<ul>' + m + '</ul>';
  });

  // Paragraphs
  html = html.split('\n\n').map(block => {
    const t = block.trim();
    if (!t) return '';
    if (/^<(h[1-6]|pre|ul|ol|blockquote|hr|table|tr|input)/.test(t)) return t;
    return '<p>' + t.replace(/\n/g,'<br>') + '</p>';
  }).join('\n');

  return html;
}

function getFilteredPosts() {
  let filtered = [...posts];
  if (currentCat === '__bookmark__') filtered = filtered.filter(p=>p.bookmark);
  else if (currentCat) filtered = filtered.filter(p=>p.cat===currentCat);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(p=>
      p.title.toLowerCase().includes(q) ||
      p.content.toLowerCase().includes(q) ||
      (p.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  switch(currentSort) {
    case 'newest': filtered.sort((a,b)=>b.id-a.id); break;
    case 'oldest': filtered.sort((a,b)=>a.id-b.id); break;
    case 'title': filtered.sort((a,b)=>a.title.localeCompare(b.title,'ko')); break;
    case 'views': filtered.sort((a,b)=>b.views-a.views); break;
  }
  return filtered;
}

function renderList() {
  const filtered = getFilteredPosts();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if (currentPage > totalPages) currentPage = 1;
  const pageItems = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  const tbody = document.getElementById('post-tbody');
  const noResults = document.getElementById('no-results');

  if (!pageItems.length) {
    tbody.innerHTML = '';
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
    tbody.innerHTML = pageItems.map((p,i) => {
      const num = total - (currentPage-1)*PAGE_SIZE - i;
      const tags = (p.tags||[]).map(t=>`<span class="tag" onclick="event.stopPropagation();filterTag('${esc(t)}')">#${esc(t)}</span>`).join('');
      const star = p.bookmark ? '★' : '☆';
      return `<tr onclick="viewPost(${p.id})">
        <td class="post-num">${num}</td>
        <td><span class="post-cat-badge cat-${p.cat}">${p.cat}</span></td>
        <td class="post-title-cell">
          <div class="post-title-link">${esc(p.title)}</div>
          ${tags?`<div class="post-tags">${tags}</div>`:''}
        </td>
        <td class="post-date">${p.date}</td>
        <td class="post-views">${p.views}</td>
        <td class="bookmark-star${p.bookmark?' active':''}" onclick="event.stopPropagation();toggleBookmark(${p.id})">${star}</td>
      </tr>`;
    }).join('');
  }

  renderPagination(totalPages);
  const catCounts={};
  posts.forEach(p=>{catCounts[p.cat]=(catCounts[p.cat]||0)+1;});
  document.getElementById('stats-bar').innerHTML =
    `<span>전체: ${posts.length}개</span>` +
    Object.entries(catCounts).map(([k,v])=>`<span>${k}: ${v}개</span>`).join('') +
    `<span>북마크: ${posts.filter(p=>p.bookmark).length}개</span>` +
    (currentSearch?`<span style="color:var(--accent)">검색결과: ${filtered.length}개</span>`:'');

  updateSideCounts();
  updateTagCloud();
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="gotoPage(${currentPage-1})">◀</button>`;
  const start = Math.max(1, currentPage-2);
  const end = Math.min(totalPages, start+4);
  for (let i=start; i<=end; i++)
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})">▶</button>`;
  pg.innerHTML = html;
}

function updateSideCounts() {
  document.getElementById('cnt-all').textContent = posts.length;
  ['마케팅','창작론','생활팁'].forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if (el) el.textContent = posts.filter(p=>p.cat===c).length;
  });
  document.getElementById('cnt-bookmark').textContent = posts.filter(p=>p.bookmark).length;
}

function updateTagCloud() {
  const tagMap = {};
  posts.forEach(p=>(p.tags||[]).forEach(t=>{tagMap[t]=(tagMap[t]||0)+1;}));
  const sorted = Object.entries(tagMap).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById('tag-cloud').innerHTML = sorted.map(([t,c])=>
    `<span class="tag" onclick="filterTag('${esc(t)}')" title="${c}개 문서">#${esc(t)}</span>`
  ).join('');
}

function showView(name) {
  document.getElementById('list-view').style.display = name==='list'?'block':'none';
  document.getElementById('post-view').style.display = name==='post'?'block':'none';
  document.getElementById('editor-view').style.display = name==='editor'?'block':'none';
}

function showList() {
  showView('list');
  renderList();
  viewingPostId = null;
  editingPostId = null;
}

function viewPost(id) {
  const p = posts.find(x=>x.id===id);
  if (!p) return;
  p.views = (p.views||0)+1;
  saveData();
  viewingPostId = id;
  document.getElementById('pv-cat').textContent = '['+p.cat+']';
  document.getElementById('pv-title').textContent = p.title;
  document.getElementById('pv-date').textContent = p.date;
  document.getElementById('pv-views').textContent = p.views;
  document.getElementById('pv-body').innerHTML = parseMarkdown(p.content);
  const tagsRow = document.getElementById('pv-tags-row');
  if (p.tags && p.tags.length) {
    tagsRow.innerHTML = '<span class="pv-tags-label">태그:</span>' +
      p.tags.map(t=>`<span class="tag" onclick="filterTag('${esc(t)}')">#${esc(t)}</span>`).join('');
    tagsRow.style.display = 'flex';
  } else { tagsRow.style.display = 'none'; }
  document.getElementById('pv-bookmark-btn').textContent = p.bookmark ? '★ 북마크 해제' : '☆ 북마크';
  showView('post');
  window.scrollTo(0,0);
}

function showEditor(editId) {
  editingPostId = editId || null;
  const hdr = document.getElementById('editor-header');
  if (editId) {
    const p = posts.find(x=>x.id===editId);
    if (!p) return;
    hdr.textContent = '✏️ 문서 수정';
    document.getElementById('edit-cat').value = p.cat;
    document.getElementById('edit-title').value = p.title;
    document.getElementById('edit-tags').value = (p.tags||[]).join(', ');
    document.getElementById('edit-content').value = p.content;
  } else {
    hdr.textContent = '✏️ 새 글 작성';
    document.getElementById('edit-cat').value = '마케팅';
    document.getElementById('edit-title').value = '';
    document.getElementById('edit-tags').value = '';
    document.getElementById('edit-content').value = '';
  }
  switchTab('edit');
  showView('editor');
  window.scrollTo(0,0);
  setTimeout(()=>document.getElementById('edit-title').focus(),100);
}

function cancelEdit() {
  if (editingPostId) viewPost(editingPostId);
  else showList();
}

function savePost() {
  const title = document.getElementById('edit-title').value.trim();
  const cat = document.getElementById('edit-cat').value;
  const content = document.getElementById('edit-content').value;
  const tags = document.getElementById('edit-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  if (!title) { showToast('제목을 입력해주세요.'); return; }
  if (!content.trim()) { showToast('내용을 입력해주세요.'); return; }
  const today = new Date().toISOString().slice(0,10);
  if (editingPostId) {
    const p = posts.find(x=>x.id===editingPostId);
    if (p) { p.title=title; p.cat=cat; p.content=content; p.tags=tags; }
    saveData();
    showToast('문서가 수정되었습니다!');
    viewPost(editingPostId);
  } else {
    const newId = posts.length > 0 ? Math.max(...posts.map(p=>p.id))+1 : 1;
    posts.push({id:newId,cat,title,tags,content,date:today,views:0,bookmark:false});
    saveData();
    showToast('새 문서가 저장되었습니다!');
    viewPost(newId);
  }
}

function editCurrentPost() { if (viewingPostId) showEditor(viewingPostId); }

function deleteCurrentPost() {
  if (!viewingPostId) return;
  const p = posts.find(x=>x.id===viewingPostId);
  if (!p || !confirm('"'+p.title+'" 문서를 삭제하시겠습니까?')) return;
  posts = posts.filter(x=>x.id!==viewingPostId);
  saveData();
  showToast('문서가 삭제되었습니다.');
  showList();
}

function filterCat(cat) {
  currentCat = cat; currentPage = 1; currentSearch = '';
  document.getElementById('search-input').value = '';
  ['all','마케팅','창작론','생활팁','bookmark'].forEach(c=>{
    const el = document.getElementById('cat-'+c);
    if (el) el.classList.remove('active');
  });
  const key = cat==='__bookmark__'?'bookmark':(cat||'all');
  const el = document.getElementById('cat-'+key);
  if (el) el.classList.add('active');
  const titles={'':'전체 문서 목록','마케팅':'마케팅 문서','창작론':'창작론 문서','생활팁':'생활팁 문서','__bookmark__':'북마크한 문서'};
  const icons={'':'📋','마케팅':'📊','창작론':'✍️','생활팁':'💡','__bookmark__':'⭐'};
  document.getElementById('board-title').textContent=(icons[cat]||'📋')+' '+(titles[cat]||cat);
  showView('list');
  renderList();
}

function filterTag(tag) {
  currentSearch=tag; currentCat=''; currentPage=1;
  document.getElementById('search-input').value=tag;
  showView('list');
  renderList();
}

function doSearch() {
  currentSearch=document.getElementById('search-input').value.trim();
  currentPage=1;
  showView('list');
  renderList();
}

function clearSearch() {
  currentSearch='';
  document.getElementById('search-input').value='';
  renderList();
}

function applySort() {
  currentSort=document.getElementById('sort-select').value;
  currentPage=1;
  renderList();
}

function gotoPage(n) { currentPage=n; renderList(); window.scrollTo(0,0); }

function toggleBookmark(id) {
  const p=posts.find(x=>x.id===id);
  if(p){p.bookmark=!p.bookmark;saveData();renderList();}
}

function toggleBookmarkCurrent() {
  if(!viewingPostId)return;
  const p=posts.find(x=>x.id===viewingPostId);
  if(p){
    p.bookmark=!p.bookmark;saveData();
    document.getElementById('pv-bookmark-btn').textContent=p.bookmark?'★ 북마크 해제':'☆ 북마크';
    showToast(p.bookmark?'북마크에 추가되었습니다.':'북마크에서 제거되었습니다.');
  }
}

function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  localStorage.setItem('dhyun_wiki_dark',isDark?'1':'0');
  document.getElementById('dark-btn').textContent=isDark?'☀️ 라이트모드':'🌙 다크모드';
}

function switchTab(tab) {
  const tabs=document.querySelectorAll('.etab');
  tabs[0].classList.toggle('active',tab==='edit');
  tabs[1].classList.toggle('active',tab==='preview');
  const ta=document.getElementById('edit-content');
  const pv=document.getElementById('preview-content');
  const tb=document.getElementById('md-toolbar');
  if(tab==='edit'){ta.style.display='block';tb.style.display='flex';pv.style.display='none';}
  else{ta.style.display='none';tb.style.display='none';pv.style.display='block';pv.innerHTML=parseMarkdown(ta.value);}
}

function insertMd(before,after) {
  const ta=document.getElementById('edit-content');
  const s=ta.selectionStart,e=ta.selectionEnd;
  const sel=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+sel+after+ta.value.substring(e);
  ta.selectionStart=s+before.length;
  ta.selectionEnd=s+before.length+sel.length;
  ta.focus();
}

function showBackupModal() {
  const json=JSON.stringify(posts,null,2);
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>💾 JSON 백업</h3><p>아래 내용을 복사하여 저장해두세요.</p><textarea readonly>${esc(json)}</textarea><div class="modal-btns"><button class="save-btn" onclick="navigator.clipboard.writeText(this.closest('.modal').querySelector('textarea').value).then(()=>showToast('복사 완료!'))">📋 복사</button><button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">닫기</button></div></div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('textarea').select();
}

function showRestoreModal() {
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>📥 JSON 복원</h3><p>백업한 JSON 데이터를 붙여넣으세요. <strong>기존 데이터가 교체됩니다.</strong></p><textarea placeholder="JSON 데이터를 여기에 붙여넣으세요..."></textarea><div class="modal-btns"><button class="save-btn" onclick="doRestore(this)">복원하기</button><button class="cancel-btn" onclick="this.closest('.modal-overlay').remove()">취소</button></div></div>`;
  document.body.appendChild(overlay);
}

function doRestore(btn) {
  try {
    const data=JSON.parse(btn.closest('.modal').querySelector('textarea').value);
    if(!Array.isArray(data))throw new Error('배열 형식이 아닙니다');
    posts=data;saveData();
    btn.closest('.modal-overlay').remove();
    showList();showToast('데이터가 복원되었습니다!');
  } catch(e){showToast('잘못된 JSON: '+e.message);}
}

let toastTimer=null;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
if(localStorage.getItem('dhyun_wiki_dark')==='1'){
  document.body.classList.add('dark');
  document.getElementById('dark-btn').textContent='☀️ 라이트모드';
}
showList();
</script>
